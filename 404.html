<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — ViralSidekick</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0a0d16">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M18 2 6 18h8l-2 12L24 12h-8l2-10z' fill='%238b5cf6'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:hsl(230 24% 5%);--fg:hsl(220 12% 96%);--muted:hsl(220 8% 62%);--border2:hsl(228 14% 24%);--primary:hsl(260 90% 66%);--accent:hsl(190 92% 56%)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
background-image:radial-gradient(900px 500px at 50% -10%, hsl(260 90% 66% / .14), transparent 60%)}
.code{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.24em;color:var(--accent);text-transform:uppercase;margin-bottom:14px}
h1{font-size:clamp(2rem,6vw,3.2rem);font-weight:800;letter-spacing:-.03em}
h1 b{background:linear-gradient(120deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
p{color:var(--muted);margin:14px auto 26px;max-width:40ch}
.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
a.btn{display:inline-flex;padding:12px 22px;border-radius:11px;font-weight:600;font-size:.9rem;text-decoration:none;color:#fff;background:linear-gradient(120deg,var(--primary),hsl(280 90% 62%))}
a.ghost{background:transparent;border:1px solid var(--border2);color:var(--fg)}
</style>
</head>
<body>
<div>
  <div class="code">404 · signal lost</div>
  <h1>This page didn't <b>go viral</b>.</h1>
  <p>It doesn't exist. Your channel's next hit might though — run a free scan and find out.</p>
  <div class="row">
    <a class="btn" href="/dashboard.html">Run a free scan</a>
    <a class="btn ghost" href="/">Back home</a>
  </div>
</div>
</body>
</html>
