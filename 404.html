<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — ViralSidekick</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0a0d16">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M18 2 6 18h8l-2 12L24 12h-8l2-10z' fill='%238b5cf6'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:hsl(230 24% 5%); --fg:hsl(220 12% 96%); --muted:hsl(220 8% 62%); --faint:hsl(220 8% 40%);
  --border:hsl(228 14% 16%); --border2:hsl(228 14% 24%);
  --primary:hsl(260 90% 66%); --accent:hsl(190 92% 56%);
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
body{
  background:var(--bg);color:var(--fg);font-family:var(--sans);
  min-height:100vh;display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
::selection{background:hsl(260 90% 66% / .45);color:#fff}
a{color:inherit;text-decoration:none}
:focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:4px}

.bg-app{
  position:fixed;inset:0;z-index:-2;
  background:radial-gradient(900px 500px at 50% -10%, hsl(260 90% 66% / .16), transparent 60%),
    radial-gradient(600px 400px at 0% 80%, hsl(190 92% 56% / .07), transparent 55%), var(--bg);
}
.bg-grid{
  position:fixed;inset:0;z-index:-1;pointer-events:none;
  background-image:linear-gradient(to right,hsl(228 14% 16% / .4) 1px,transparent 1px),
    linear-gradient(to bottom,hsl(228 14% 16% / .4) 1px,transparent 1px);
  background-size:56px 56px;
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,#000 30%,transparent 80%);
  mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,#000 30%,transparent 80%);
}

/* nav */
nav.top{
  position:sticky;top:0;z-index:50;
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  background:hsl(230 24% 5% / .84);border-bottom:1px solid var(--border);
}
nav.top .inner{max-width:960px;margin:0 auto;padding:0 22px;display:flex;align-items:center;height:60px;gap:20px}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:.98rem;letter-spacing:-.02em;flex-shrink:0}
.logo .bolt{width:19px;height:19px}
.logo b{background:linear-gradient(120deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
.nav-links{margin-left:auto;display:flex;gap:16px;align-items:center;font-size:.85rem;color:var(--muted)}
.nav-links a:hover{color:var(--fg)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:.86rem;padding:9px 18px;border-radius:10px;border:1px solid transparent;cursor:pointer;transition:all .18s;font-family:var(--sans);white-space:nowrap;min-height:38px}
.btn-primary{background:linear-gradient(120deg,var(--primary),hsl(280 90% 62%));color:#fff;box-shadow:0 4px 20px hsl(260 90% 66% / .3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 28px hsl(260 90% 66% / .45)}
.btn-ghost{border-color:var(--border2);color:var(--muted)}
.btn-ghost:hover{color:var(--fg);border-color:hsl(260 90% 66% / .55);transform:translateY(-1px)}
.btn-sm{padding:7px 14px;font-size:.8rem;min-height:34px}

/* hero */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 22px;text-align:center}
.hero{max-width:480px;animation:fadeup .5s ease both}
@keyframes fadeup{from{opacity:0;transform:translateY(12px)}}
.code{font-family:var(--mono);font-size:.68rem;letter-spacing:.28em;color:var(--accent);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:10px}
.code .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
@keyframes pulse{50%{opacity:.3}}
h1{font-size:clamp(2rem,6vw,3rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:14px}
h1 .grad{background:linear-gradient(120deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
p{color:var(--muted);margin-bottom:28px;font-size:1rem;max-width:38ch;margin-left:auto;margin-right:auto;line-height:1.6}
.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* footer */
footer{border-top:1px solid var(--border);padding:22px 0}
footer .inner{max-width:960px;margin:0 auto;padding:0 22px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:.8rem;color:var(--faint)}
footer a{color:var(--muted)}
footer a:hover{color:var(--fg)}
</style>
</head>
<body>
<div class="bg-app" aria-hidden="true"></div>
<div class="bg-grid" aria-hidden="true"></div>

<nav class="top" role="navigation" aria-label="main navigation">
  <div class="inner">
    <a class="logo" href="index.html" aria-label="ViralSidekick home">
      <svg class="bolt" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M18 2 6 18h8l-2 12L24 12h-8l2-10z" fill="url(#lg-404)"/>
        <defs><linearGradient id="lg-404" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#22d3ee"/></linearGradient></defs>
      </svg>
      VIRAL <b>SIDEKICK</b>
    </a>
    <nav class="nav-links" aria-label="secondary navigation">
      <a href="app.html">Log in</a>
      <a class="btn btn-primary btn-sm" href="dashboard.html">Free scan</a>
    </nav>
  </div>
</nav>

<main>
  <div class="hero">
    <div class="code"><span class="dot" aria-hidden="true"></span>404 · signal lost</div>
    <h1>This page didn't <span class="grad">go viral</span>.</h1>
    <p>It doesn't exist. Your channel's next hit might though — run a free scan and find out.</p>
    <div class="row">
      <a class="btn btn-primary" href="/dashboard.html">Run a free scan</a>
      <a class="btn btn-ghost" href="/">Back home</a>
    </div>
  </div>
</main>

<footer role="contentinfo">
  <div class="inner">
    <span>© 2026 Stromation LLC</span>
    <nav aria-label="footer links" style="display:flex;gap:18px">
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="mailto:contact@stromation.com">Contact</a>
    </nav>
  </div>
</footer>
</body>
</html>
